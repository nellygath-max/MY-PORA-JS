<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click Counter</title>
</head>
<body>

    <h1>Click Counter</h1>
    <p id="count">0</p>
    <button id="btn">Click Me</button>


    <button id="reset">Reset</button>


    <div id="Bg=Color">
        <h1>Color Changer</h1>

        <button id="btn2">Change Color</button>
    </div>

     <h1 id="greeting"></h1><br><br>

    <div id="app">
    <section>
        <h2 id="Contactform">My Contact Form</h2>
    
        <!-- <img src="./pics/nellypics2.jpeg" class="nellypics2" style="width: 100px; height: 100px;" alt="My pics"> -->

        <form id="form">
            <label for="name" class="name">Name</label><br>
            <input type="text" class="name1"><br><br>

            <label for="email">Email</label><br>
            <input type="email" id="email"><br><br>

            <label for="phone number">Phone number</label><br>
            <input type="tel" class="tel"><br><br>

            <label for="message">Message</label><br>
            <textarea id="message" class="msg-box" rows="4"></textarea><br><br>

            <button input="submit" class="submit">submit</button>
        </form>
    </section>
    </div>

    <div id="favorite-color-section">
    <section>
        <h2 id="color-title">Favorite Color Form</h2>
        <form id="color-form">
            <label for="fav-color" class="name">Choose your favorite color:</label><br>
            <input type="color" id="fav-color"><br><br>
            <button type="submit" class="submit">Apply Color</button>
        </form>
    </section>


    
    <div id="age-section">
    <section>
        <h2 id="age-title">Age Display Form</h2>
        <form id="age-form">
            <label for="birth-year" class="name">Enter your Birth Year:</label><br>
            <input type="number" id="birth-year" class="age-input" placeholder="e.g., 2000"><br><br>
            <button type="submit" class="submit">Calculate Age</button>
        </form>
        <h3 id="age-result" class="result-text"></h3>
    </section>
    </div>


    <script src="assignment.js"></script>

    
</body>
</html>
